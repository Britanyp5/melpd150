<!DOCTYPE html>
<html lang="en">
<head>
  <title>Game Moment</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body style="
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to right, #1a1a2e, #16213e);
  color: white;
  font-family: 'Orbitron', sans-serif;
">

  <div style="
    text-align: center;
    max-width: 600px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  ">

    <h1 style="color: #00f5d4;">GAME MOMENT</h1>

    <img src="passget.png" alt="Mike passes the ball" style="max-width: 100%; border-radius: 10px;">

    <p style="font-size: 18px;">Mike passes the ball back.</p>
    <p style="font-size: 18px;">Mike shoots the ball.</p>

  </div>

</body>
</html>
